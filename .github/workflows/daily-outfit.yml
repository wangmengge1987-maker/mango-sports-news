name: 每日穿搭建议

on:
  schedule:
    # 北京时间 07:17 = UTC 23:17（避开整点）
    - cron: '17 23 * * *'
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          cd outfit-agent
          pip install -r requirements.txt

      - name: 生成穿搭建议并推送微信
        run: |
          cd outfit-agent
          python main.py --auto
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          IMGURL_UID: ${{ secrets.IMGURL_UID }}
          IMGURL_TOKEN: ${{ secrets.IMGURL_TOKEN }}
          CITY: 广州

      - name: 存档穿搭文档到仓库
        run: |
          git config user.name "mango-outfit-bot"
          git config user.email "bot@mango.dev"
          git add outfit-agent/output/
          git commit -m "每日穿搭 $(date +'%Y-%m-%d')" || echo "无变更"
          git push
